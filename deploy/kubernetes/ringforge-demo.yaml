  ports:
    - name: http
      port: 5100
      targetPort: 5100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ringforge-node-65
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ringforge-node-65
  template:
    metadata:
      labels:
        app: ringforge-node-65
    spec:
      containers:
        - name: node
          image: ringforge-chord-platform:local

apiVersion: v1
kind: Service
metadata:
  name: ringforge-gateway
spec:
  type: NodePort
  selector:
    app: ringforge-gateway
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ringforge-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ringforge-gateway
  template:
    metadata:
      labels:
        app: ringforge-gateway
    spec:
      containers:
        - name: gateway
          image: ringforge-chord-platform:redis-kafka-local
          imagePullPolicy: Never
          args:
            - com.ringforge.chord.app.ServiceGatewayServer
            - --port
            - "8081"
            - --bootstrap
            - http://ringforge-node-0:5100
          ports:
            - containerPort: 8081

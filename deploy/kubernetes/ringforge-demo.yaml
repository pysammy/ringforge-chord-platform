apiVersion: v1
kind: Service
metadata:
  name: ringforge-node-0
spec:
  selector:
    app: ringforge-node-0
  ports:
    - name: http
      port: 5100
      targetPort: 5100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ringforge-node-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ringforge-node-0
  template:
    metadata:
      labels:
        app: ringforge-node-0
    spec:
      containers:
        - name: node
          image: ringforge-chord-platform:redis-kafka-local
          imagePullPolicy: Never
          args:
            - com.ringforge.chord.app.ServiceNodeMain
            - --id
            - "0"
            - --port
            - "5100"
            - --host
            - ringforge-node-0
            - --heartbeat-ms
            - "750"
            - --storage
            - redis
            - --redis-host
            - ringforge-redis-0
            - --redis-prefix
            - ringforge:node:0
            - --kafka-bootstrap-servers
            - ringforge-kafka:9092
          ports:
            - containerPort: 5100
---

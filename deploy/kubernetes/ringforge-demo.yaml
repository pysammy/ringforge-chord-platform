apiVersion: v1
kind: Service
metadata:
  name: ringforge-node-0
spec:
  selector:
    app: ringforge-node-0
  ports:
    - name: http
      port: 5100
      targetPort: 5100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ringforge-node-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ringforge-node-0
  template:
    metadata:
      labels:
        app: ringforge-node-0
    spec:
      containers:
        - name: node
          image: ringforge-chord-platform:local
          imagePullPolicy: IfNotPresent
          args:
            - com.ringforge.chord.app.ServiceNodeMain
            - --id
            - "0"
            - --port
            - "5100"
            - --host
            - ringforge-node-0
            - --heartbeat-ms
            - "750"
          ports:
            - containerPort: 5100
---
